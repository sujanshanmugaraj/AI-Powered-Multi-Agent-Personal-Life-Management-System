# ──────────────────────────────────────────────────────────────────────────────
# LifeOS AI — Production Docker Compose
# Uses SQLite (persisted volume) — no external DB required for self-hosting.
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifeos-backend
    restart: unless-stopped
    environment:
      APP_NAME: "LifeOS AI"
      DEBUG: "false"
      HOST: "0.0.0.0"
      PORT: "8000"

      # SQLite — stored in a named volume so data survives container restarts
      DATABASE_URL: "sqlite:////app/data/lifeos.db"
      CHROMADB_PATH: "/app/data/chromadb"

      # OpenAI — set your real key in .env
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}

      # CORS — allow requests from the nginx frontend container
      CORS_ORIGINS: '["http://localhost","http://localhost:80","http://frontend"]'

    volumes:
      - backend_data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - lifeos-net

  # ── React Frontend (Nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api     # relative path — nginx proxies /api → backend
    container_name: lifeos-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lifeos-net

volumes:
  backend_data:       # SQLite db + ChromaDB vector store

networks:
  lifeos-net:
    name: lifeos-network
